<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors - ShopTLU</title>
    <style>
        h1 
        { 
            color: #3e57b0; 
        }

        .top-bar.dark h1 
        {
            text-transform: uppercase; 
        }

        #app header 
        {
            background-color: #f0f0f0;
            padding: 15px;
        }

        a[href="/"] 
        { 
            color: purple; 
        }

        nav a:first-child 
        { 
            text-decoration: underline; 
            font-style: italic; 
        }

        article:not(.featured) h2 
        { 
            color: #FF1493;
        }

        .product.featured h2 
        {
            color: orange; 
        }

        .price 
        { 
            color: red; 
            font-weight: bold; 
        }

        article > p 
        {
            border-left: 5px solid green; 
            padding-left: 10px; 
        }

        .product {
            margin: 20px;
            padding: 15px;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div id="app">
        <header class="top-bar dark">
            <h1>ShopTLU</h1>
            <nav>
                <a href="/" class="active">Home</a>
                <a href="/products">Products</a>
                <a href="/about">About</a>
            </nav>
        </header>

        <main>
            <article class="product">
                <h2>iPhone 16</h2>
                <p class="price">25.990.000đ</p>
                <p>Mô tả sản phẩm...</p>
            </article>
            <article class="product featured">
                <h2>MacBook Pro</h2>
                <p class="price">45.990.000đ</p>
                <p>Mô tả sản phẩm...</p>
            </article>
        </main>
    </div>
</body>
</html>
