<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Specificity Demo</title>
    <link rel="stylesheet" href="specificity.css">
    <style>

        body {
            font-family: 'Times New Roman', Times, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f2f5;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 1rem;
        }

        #demo {
            font-size: 3rem;
            font-weight: bold;
            margin: 0;
        }

    </style>

</head>
<body>
    
    <div class="container">
        <h1>Kết quả hiển thị của phần tử:</h1>
        <p id="demo" class="text highlight">Hello World</p>
    </div>

</body>
</html>
