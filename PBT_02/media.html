<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sản phẩm Multimedia - Trần Thị Minh Duyên</title>
</head>
<body>

    <h1>Trang Giới thiệu Sản phẩm Multimedia</h1>

    <section>
        <h2>Logo Thương hiệu (SVG Inline)</h2>

        <svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <rect x="10" y="10" width="80" height="80" rx="15" fill="black" />
            <circle cx="50" cy="50" r="30" fill="gray" />
            <text x="50" y="58" font-size="20" text-anchor="middle" fill="white">TD</text>
        </svg>

    </section>

    <hr>

    <section>
        <h2>Danh mục Sản phẩm</h2>
        
        <figure>
            <img src="https://images.unsplash.com/photo-1592899677977-9c10ca588bbd?w=1000" 
                 alt="iPhone 16 Pro Max màu titan" 
                 loading="lazy" 
                 style="max-width: 100%; height: auto;"> <figcaption>iPhone 16 Pro Max - Thiết kế titan mới nhất.</figcaption>
        </figure>

        <figure>
            <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=1000" 
                 alt="MacBook Air mỏng nhẹ" 
                 loading="lazy" 
                 style="max-width: 100%; height: auto;"> <figcaption>MacBook Air - Đỉnh cao của sự mỏng nhẹ.</figcaption>
        </figure>

        <figure>
            <img src="https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?w=1000" 
                 alt="Máy tính bảng iPad Pro" 
                 loading="lazy" 
                 style="max-width: 100%; height: auto;"> <figcaption>iPad Pro - Sức mạnh đồ họa chuyên nghiệp.</figcaption>
        </figure>

    </section>

    <hr>

    <section>
        <h2>Video Đánh giá (YouTube)</h2>

        <iframe width="560" height="315" 
                src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                title="YouTube video player" 
                frameborder="0" 
                allowfullscreen>
        </iframe>

    </section>

    <hr>

    <section>
        <h2>Video Quảng cáo (Local)</h2>

        <video controls poster="https://via.placeholder.com/800x450?text=Poster+Video" width="640" style="max-width: 100%;">
            <source src="intro.mp4" type="video/mp4">
            <source src="intro.webm" type="video/webm">
            Trình duyệt không hỗ trợ thẻ video.
        </video>

    </section>

    <hr>

    <section>
        <h2>Nhạc nền giới thiệu</h2>

        <audio controls>
            <source src="background.mp3" type="audio/mpeg">
            <source src="background.ogg" type="audio/ogg">
            Trình duyệt không hỗ trợ thẻ audio.
        </audio>
        
    </section>

    <p>Người thực hiện: Trần Thị Minh Duyên - 66KTPM1</p>

</body>
</html>
